<!DOCTYPE html>
<html>
<head>
<title>Modern Portfolio Website</title>

<style>
body {
font-family: Arial;
background:#0f172a;
color:#f1f5f9;
}

.hero {
background:#ff8c42;
padding:60px;
text-align:center;
}

button {
background:#ffa751;
padding:10px 20px;
border:none;
color:white;
}
</style>

</head>

<body>

<h1>Modern Portfolio Website</h1>


<section class="hero">
<h1>Welcome</h1>
<p>Create amazing websites easily</p>
<button>Get Started</button>
</section>

<section>
<h2>Features</h2>
<ul>
<li>Fast</li>
<li>Secure</li>
<li>Scalable</li>
</ul>
</section>

<section>
<h2>About Us</h2>
<p>We build modern web experiences.</p>
</section>

<section>
<h2>Portfolio</h2>
<p>Showcase your projects here.</p>
</section>

<section>
<h2>Contact</h2>
<p>Email us anytime.</p>
</section>

<script>
  // Example: button click
  document.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      alert('You clicked a button!');
    });
  });

  // Example: smooth scroll for menu links
  document.querySelectorAll('nav a').forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) target.scrollIntoView({ behavior: 'smooth' });
    });
  });
</script>

</body>
</html>
